<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloodConnect - Register as Donor</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="brand">
            <span class="heart">&#10084;</span> BloodConnect
        </div>
        <a href="index.html" class="btn btn-outline">Search Donors</a>
    </nav>

    <div class="container">
        <div class="search-card">
            <h2 class="form-title">Register as a Donor</h2>
            <p class="form-subtitle">Your information helps someone find you in an emergency.</p>

            <div class="form-row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Your full name">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="phone" placeholder="10-digit number" maxlength="10">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Blood Group</label>
                    <select id="bloodGroup">
                        <option value="">Select blood group</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>City</label>
                    <input type="text" id="city" placeholder="Your city">
                </div>
            </div>

            <div class="form-group">
                <label>Area / Locality</label>
                <input type="text" id="area" placeholder="e.g. Sector 62, Noida">
            </div>

            <div class="form-group">
                <label>Last Donation Date (if any)</label>
                <input type="date" id="lastDonatedDate">
                <small style="color:#888;">Leave empty if you have never donated before</small>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="available" checked>
                <label for="available">I am currently available to donate</label>
            </div>

            <button class="btn btn-primary btn-full" onclick="registerDonor()">
                &#10084; Register as Donor
            </button>

            <p id="error-msg" class="error-msg"></p>

            <!-- SUCCESS MESSAGE -->
            <div id="success-box" class="success-box" style="display:none;">
                <div class="success-icon">&#10003;</div>
                <h3>Registered Successfully!</h3>
                <p>You are now visible to people searching for donors in your city.</p>
                <a href="index.html" class="btn btn-primary">Go to Search</a>
            </div>
        </div>
    </div>

    <script src="js/register.js"></script>
</body>
</html>
