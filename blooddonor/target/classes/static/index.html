<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloodConnect - Find a Donor</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- NAVBAR -->
   <nav class="navbar">
    <div class="brand">
        <span class="heart">&#10084;</span> BloodConnect
    </div>
    <div style="display:flex; gap:10px;">
        <a href="register.html" class="btn btn-outline">Become a Donor</a>
        <a href="admin.html" class="btn btn-primary">Admin</a>
    </div>
</nav>

    <!-- HERO -->
    <div class="hero">
        <h1>Find a Blood Donor Near You</h1>
        <p>Search by blood group and city to connect with donors instantly</p>
    </div>

    <!-- SEARCH FORM -->
    <div class="container">
        <div class="search-card">
            <div class="form-row">
                <div class="form-group">
                    <label>Blood Group Needed</label>
                    <select id="bloodGroup">
                        <option value="">Select blood group</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>City</label>
                    <input type="text" id="city" placeholder="e.g. Noida, Delhi...">
                </div>
            </div>
            <button class="btn btn-primary btn-full" onclick="searchDonors()">
                Search Donors
            </button>
            <p id="error-msg" class="error-msg"></p>
        </div>

        <!-- STATS -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-number">1,240+</div>
                <div class="stat-label">Registered Donors</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">48</div>
                <div class="stat-label">Cities Covered</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">8</div>
                <div class="stat-label">Blood Groups</div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
